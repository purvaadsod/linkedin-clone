<svg xmlns="http://www.w3.org/2000/svg" width="165" height="50" viewBox="0 0 165 50" role="img" aria-label="LinkedIn Logo">
  <g font-family="Arial, Helvetica, sans-serif" font-weight="bold">
    <!-- "Linked" text -->
    <text x="0" y="35" font-size="36" fill="#0A66C2">Linked</text>

    <!-- Tight blue background behind "in" (no extra padding) -->
    <!-- Width is only slightly wider than the text itself -->
    <rect x="118" y="10" width="27" height="26" fill="#0A66C2"/>

    <!-- "in" text perfectly centered in box with no padding -->
    <text x="121" y="30" font-size="20" fill="#FFFFFF">in</text>
  </g>
</svg>
